<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveLog Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-card: #1a1d2e;
    --bg-card-hover: #222640;
    --border: #2a2e45;
    --text-primary: #e8eaf0;
    --text-secondary: #8b8fa3;
    --text-muted: #5c6078;
    --accent-blue: #4f8cff;
    --accent-green: #34d399;
    --accent-orange: #fb923c;
    --accent-red: #f87171;
    --accent-purple: #a78bfa;
    --accent-cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px;
  }

  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .dashboard-header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .dashboard-header h1 span { color: var(--accent-blue); }

  .header-meta {
    text-align: right;
    color: var(--text-secondary);
    font-size: 13px;
  }

  .header-meta .truck-info {
    font-size: 14px;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 2px;
  }

  .tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--bg-card);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
  }

  .tab-btn {
    padding: 10px 22px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--text-primary); background: var(--bg-card-hover); }
  .tab-btn.active { background: var(--accent-blue); color: #fff; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: transform 0.15s, border-color 0.15s;
  }

  .kpi-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent-blue);
  }

  .kpi-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .kpi-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .kpi-value.blue { color: var(--accent-blue); }
  .kpi-value.green { color: var(--accent-green); }
  .kpi-value.orange { color: var(--accent-orange); }
  .kpi-value.purple { color: var(--accent-purple); }
  .kpi-value.cyan { color: var(--accent-cyan); }
  .kpi-value.red { color: var(--accent-red); }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .grid-full { margin-bottom: 24px; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .icon-blue { background: var(--accent-blue); }
  .icon-green { background: var(--accent-green); }
  .icon-orange { background: var(--accent-orange); }
  .icon-purple { background: var(--accent-purple); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 12px;
    border-bottom: 1px solid rgba(42, 46, 69, 0.5);
    color: var(--text-primary);
  }

  tbody tr:hover { background: var(--bg-card-hover); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-green { background: rgba(52, 211, 153, 0.15); color: var(--accent-green); }
  .badge-orange { background: rgba(251, 146, 60, 0.15); color: var(--accent-orange); }

  .chart-container {
    position: relative;
    height: 280px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .status-received { background: var(--accent-green); }
  .status-pending { background: var(--accent-orange); }

  .maint-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(42, 46, 69, 0.5);
  }

  .maint-item:last-child { border-bottom: none; }

  .maint-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .maint-details { flex: 1; }
  .maint-service { font-weight: 600; font-size: 14px; }
  .maint-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .maint-cost { font-weight: 700; font-size: 14px; }
  .maint-cost.free { color: var(--accent-green); }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(79, 140, 255, 0.06);
    border-radius: 8px;
    margin-top: 12px;
  }

  .summary-label { font-size: 13px; color: var(--text-secondary); }
  .summary-value { font-size: 18px; font-weight: 700; }

  .empty-msg {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 15px;
  }

  @media (max-width: 768px) {
    .grid-2 { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    body { padding: 12px; }
  }
</style>
</head>
<body>

<div class="dashboard-header">
  <h1 id="dash-title">DriveLog Dashboard</h1>
  <div class="header-meta">
    <div class="truck-info" id="dash-vehicle"></div>
    <div id="dash-meta"></div>
  </div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
  <button class="tab-btn" onclick="switchTab('fuel')">Fuel & Mileage</button>
  <button class="tab-btn" onclick="switchTab('reimbursement')">Reimbursements</button>
  <button class="tab-btn" onclick="switchTab('maintenance')">Maintenance</button>
</div>

<div id="tab-overview" class="tab-content active"></div>
<div id="tab-fuel" class="tab-content"></div>
<div id="tab-reimbursement" class="tab-content"></div>
<div id="tab-maintenance" class="tab-content"></div>

<script>
// ═══════════ LOAD DATA FROM LOCALSTORAGE ═══════════
let entries = [];
let settings = { url: '', lastOdo: 0, vehicleName: '', appName: '' };

try {
  const saved = localStorage.getItem('vehicleEntries');
  if (saved) entries = JSON.parse(saved);
  const savedSettings = localStorage.getItem('vehicleSettings');
  if (savedSettings) {
    const s = JSON.parse(savedSettings);
    if (s.url) settings.url = s.url;
    if (s.lastOdo) settings.lastOdo = s.lastOdo;
    if (s.vehicleName) settings.vehicleName = s.vehicleName;
    if (s.appName) settings.appName = s.appName;
  }
} catch(e) {}

// Update header
document.getElementById('dash-title').textContent = (settings.appName || 'DriveLog') + ' Dashboard';
document.title = (settings.appName || 'DriveLog') + ' Dashboard';
document.getElementById('dash-vehicle').textContent = settings.vehicleName || '';

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function $(amount) { return '$' + amount.toFixed(2); }

// Chart defaults
Chart.defaults.color = '#8b8fa3';
Chart.defaults.borderColor = 'rgba(42, 46, 69, 0.6)';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

// ═══════════ COMPUTE STATS ═══════════
const fuelEntries = entries.filter(e => e.type === 'fuel').sort((a,b) => a.date.localeCompare(b.date));
const reimbEntries = entries.filter(e => e.type === 'reimb').sort((a,b) => a.date.localeCompare(b.date));
const maintEntries = entries.filter(e => e.type === 'maint').sort((a,b) => b.date.localeCompare(a.date));
const defEntries = entries.filter(e => e.type === 'def');

const totalFuelSpend = fuelEntries.reduce((s,e) => s + e.spend, 0);
const totalMaintSpend = maintEntries.reduce((s,e) => s + e.spend, 0);
const totalDefSpend = defEntries.reduce((s,e) => s + e.spend, 0);
const totalSpend = totalFuelSpend + totalMaintSpend + totalDefSpend;
const totalGallons = fuelEntries.reduce((s,e) => s + (e.volume||0), 0);
const totalMiles = fuelEntries.reduce((s,e) => s + (e.milesDriven||0), 0);
const avgMpg = totalGallons > 0 ? totalMiles / totalGallons : 0;
const totalReimbVal = reimbEntries.reduce((s,e) => s + e.value, 0);
const reimbReceived = reimbEntries.filter(e => e.received).reduce((s,e) => s + e.value, 0);
const reimbPending = totalReimbVal - reimbReceived;
const totalReimbMiles = reimbEntries.reduce((s,e) => s + e.miles, 0);
const netPosition = totalReimbVal - totalSpend;
const latestOdo = settings.lastOdo || 0;
const costPerMile = totalMiles > 0 ? totalFuelSpend / totalMiles : 0;

// ═══════════ OVERVIEW TAB ═══════════
if (entries.length === 0) {
  document.getElementById('tab-overview').innerHTML = '<div class="empty-msg">No data yet. Log entries in the DriveLog app to see your dashboard.</div>';
} else {
  document.getElementById('tab-overview').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Total Spend</div><div class="kpi-value orange">${$(totalSpend)}</div><div class="kpi-sub">Fuel + Maintenance + DEF</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Reimbursed</div><div class="kpi-value green">${$(totalReimbVal)}</div><div class="kpi-sub">${$(reimbReceived)} received &bull; ${$(reimbPending)} pending</div></div>
      <div class="kpi-card"><div class="kpi-label">Net Position</div><div class="kpi-value ${netPosition >= 0 ? 'green' : 'red'}">${netPosition >= 0 ? '+' : ''}${$(netPosition)}</div><div class="kpi-sub">${netPosition >= 0 ? 'Reimbursements exceed spend' : 'Spend exceeds reimbursements'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Miles Reimbursed</div><div class="kpi-value purple">${totalReimbMiles.toFixed(1)}</div><div class="kpi-sub">${totalReimbMiles > 0 ? 'Avg $'+(totalReimbVal/totalReimbMiles).toFixed(3)+'/mi rate' : ''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Miles Driven</div><div class="kpi-value blue">${totalMiles.toFixed(1)}</div><div class="kpi-sub">${latestOdo > 0 ? 'Current odometer: ' + latestOdo.toLocaleString() : ''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Cost Per Mile</div><div class="kpi-value purple">${costPerMile > 0 ? $(costPerMile) : '&mdash;'}</div><div class="kpi-sub">Fuel cost only</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Fuel Economy</div><div class="kpi-value cyan">${avgMpg > 0 ? avgMpg.toFixed(1) + ' MPG' : '&mdash;'}</div><div class="kpi-sub">${totalMiles.toFixed(1)} mi / ${totalGallons.toFixed(2)} gal</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-title"><span class="icon icon-blue"></span> Spend Breakdown</div><div class="chart-container"><canvas id="spendPieChart"></canvas></div></div>
      <div class="card"><div class="card-title"><span class="icon icon-green"></span> Reimbursement Status</div><div class="chart-container"><canvas id="reimbursementChart"></canvas></div></div>
    </div>
  `;

  new Chart(document.getElementById('spendPieChart'), {
    type: 'doughnut',
    data: { labels: ['Fuel', 'Maintenance', 'DEF'], datasets: [{ data: [totalFuelSpend || 0.01, totalMaintSpend || 0.01, totalDefSpend || 0.01], backgroundColor: ['#fb923c', '#a78bfa', '#22d3ee'], borderWidth: 0, hoverOffset: 8 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, pointStyle: 'circle' } }, tooltip: { callbacks: { label: ctx => ctx.label + ': $' + (ctx.raw < 0.02 ? '0.00' : ctx.raw.toFixed(2)) } } } }
  });

  new Chart(document.getElementById('reimbursementChart'), {
    type: 'doughnut',
    data: { labels: ['Received', 'Pending'], datasets: [{ data: [reimbReceived || 0.01, reimbPending || 0.01], backgroundColor: ['#34d399', '#fb923c'], borderWidth: 0, hoverOffset: 8 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true, pointStyle: 'circle' } }, tooltip: { callbacks: { label: ctx => ctx.label + ': $' + (ctx.raw < 0.02 ? '0.00' : ctx.raw.toFixed(2)) } } } }
  });
}

// ═══════════ FUEL TAB ═══════════
if (fuelEntries.length === 0) {
  document.getElementById('tab-fuel').innerHTML = '<div class="empty-msg">No fuel entries yet.</div>';
} else {
  let fuelRows = fuelEntries.map(e => {
    const mpg = e.volume > 0 && e.milesDriven > 0 ? (e.milesDriven / e.volume).toFixed(1) : '&mdash;';
    return `<tr><td>${formatDate(e.date)}</td><td>${e.odometer.toLocaleString()}</td><td>${e.city||''}</td><td>${e.station||''}</td><td>${e.pricePerGal ? '$'+e.pricePerGal.toFixed(2) : '&mdash;'}</td><td>${e.volume ? e.volume.toFixed(2) : '&mdash;'}</td><td>${$(e.spend)}</td><td>${e.milesDriven ? e.milesDriven.toFixed(1) : '&mdash;'}</td><td>${mpg}</td><td>${e.comments||''}</td></tr>`;
  }).join('');

  const avgPpg = fuelEntries.reduce((s,e) => s + (e.pricePerGal||0), 0) / fuelEntries.filter(e => e.pricePerGal > 0).length || 0;

  document.getElementById('tab-fuel').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Fuel Spend</div><div class="kpi-value orange">${$(totalFuelSpend)}</div><div class="kpi-sub">${fuelEntries.length} fill-up${fuelEntries.length!==1?'s':''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Price/Gal</div><div class="kpi-value purple">${avgPpg > 0 ? $(avgPpg) : '&mdash;'}</div><div class="kpi-sub">${fuelEntries.length > 0 ? 'Last fill: '+formatDate(fuelEntries[fuelEntries.length-1].date) : ''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Gallons Purchased</div><div class="kpi-value blue">${totalGallons.toFixed(2)}</div><div class="kpi-sub">${fuelEntries.length} transaction${fuelEntries.length!==1?'s':''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Miles Driven</div><div class="kpi-value cyan">${totalMiles.toFixed(1)}</div><div class="kpi-sub">From fuel logs</div></div>
    </div>
    <div class="grid-full"><div class="card"><div class="card-title"><span class="icon icon-blue"></span> Fuel Log</div>
      <table><thead><tr><th>Date</th><th>Odometer</th><th>City</th><th>Station</th><th>Price/Gal</th><th>Gallons</th><th>Spend</th><th>Miles Driven</th><th>MPG</th><th>Notes</th></tr></thead><tbody>${fuelRows}</tbody></table>
    </div></div>
    <div class="grid-2">
      <div class="card"><div class="card-title"><span class="icon icon-orange"></span> Fuel Spend Over Time</div><div class="chart-container"><canvas id="fuelSpendChart"></canvas></div></div>
      <div class="card"><div class="card-title"><span class="icon icon-cyan"></span> Miles Per Gallon Trend</div><div class="chart-container"><canvas id="mpgChart"></canvas></div></div>
    </div>
  `;

  new Chart(document.getElementById('fuelSpendChart'), {
    type: 'bar',
    data: { labels: fuelEntries.map(e => formatDate(e.date)), datasets: [{ label: 'Fuel Spend ($)', data: fuelEntries.map(e => e.spend), backgroundColor: 'rgba(251, 146, 60, 0.7)', borderColor: '#fb923c', borderWidth: 1, borderRadius: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v }, grid: { color: 'rgba(42,46,69,0.4)' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
  });

  const mpgData = fuelEntries.map(e => e.volume > 0 && e.milesDriven > 0 ? +(e.milesDriven/e.volume).toFixed(1) : null);
  new Chart(document.getElementById('mpgChart'), {
    type: 'line',
    data: { labels: fuelEntries.map(e => formatDate(e.date)), datasets: [{ label: 'MPG', data: mpgData, borderColor: '#22d3ee', backgroundColor: 'rgba(34, 211, 238, 0.1)', borderWidth: 2, pointBackgroundColor: '#22d3ee', pointRadius: 6, pointHoverRadius: 8, fill: true, tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: false, grid: { color: 'rgba(42,46,69,0.4)' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
  });
}

// ═══════════ REIMBURSEMENT TAB ═══════════
if (reimbEntries.length === 0) {
  document.getElementById('tab-reimbursement').innerHTML = '<div class="empty-msg">No reimbursement entries yet.</div>';
} else {
  let reimbRows = reimbEntries.map(e => {
    const rate = e.miles > 0 ? '$' + (e.value / e.miles).toFixed(3) + '/mi' : '&mdash;';
    const status = e.received
      ? `<span class="status-dot status-received"></span><span class="badge badge-green">Received</span>`
      : `<span class="status-dot status-pending"></span><span class="badge badge-orange">Pending</span>`;
    return `<tr><td>${formatDate(e.date)}</td><td>${e.miles.toFixed(1)}</td><td>${$(e.value)}</td><td>${rate}</td><td>${e.received ? formatDate(e.received) : '&mdash;'}</td><td>${status}</td></tr>`;
  }).join('');

  document.getElementById('tab-reimbursement').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Total Claimed</div><div class="kpi-value blue">${$(totalReimbVal)}</div><div class="kpi-sub">${reimbEntries.length} submission${reimbEntries.length!==1?'s':''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Received</div><div class="kpi-value green">${$(reimbReceived)}</div><div class="kpi-sub">${reimbEntries.filter(e=>e.received).length} payment${reimbEntries.filter(e=>e.received).length!==1?'s':''} received</div></div>
      <div class="kpi-card"><div class="kpi-label">Pending</div><div class="kpi-value orange">${$(reimbPending)}</div><div class="kpi-sub">${reimbEntries.filter(e=>!e.received).length} awaiting payment</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Miles Claimed</div><div class="kpi-value purple">${totalReimbMiles.toFixed(1)}</div><div class="kpi-sub">${totalReimbMiles > 0 ? 'Avg $'+(totalReimbVal/totalReimbMiles).toFixed(3)+'/mi' : ''}</div></div>
    </div>
    <div class="grid-full"><div class="card"><div class="card-title"><span class="icon icon-green"></span> Reimbursement Log</div>
      <table><thead><tr><th>Date Submitted</th><th>Miles Claimed</th><th>Value</th><th>Rate/Mile</th><th>Date Received</th><th>Status</th></tr></thead><tbody>${reimbRows}</tbody></table>
      <div class="summary-row"><span class="summary-label">Total Reimbursements</span><span class="summary-value green">${$(totalReimbVal)}</span></div>
    </div></div>
  `;
}

// ═══════════ MAINTENANCE TAB ═══════════
if (maintEntries.length === 0) {
  document.getElementById('tab-maintenance').innerHTML = '<div class="empty-msg">No maintenance entries yet.</div>';
} else {
  const maintColors = ['var(--accent-blue)', 'var(--accent-orange)', 'var(--accent-green)', 'var(--accent-purple)', 'var(--accent-cyan)', 'var(--accent-red)'];
  let maintItems = maintEntries.map((e, i) => `
    <div class="maint-item">
      <div class="maint-dot" style="background: ${maintColors[i % maintColors.length]};"></div>
      <div class="maint-details">
        <div class="maint-service">${e.service}</div>
        <div class="maint-meta">${formatDate(e.date)}${e.odometer > 0 ? ' &bull; ' + e.odometer.toLocaleString() + ' mi' : ''}${e.notes ? ' &bull; ' + e.notes : ''}</div>
      </div>
      <div class="maint-cost ${e.spend === 0 ? 'free' : ''}">${e.spend > 0 ? $(e.spend) : '$0 (Covered)'}</div>
    </div>
  `).join('');

  const lastServiceDate = maintEntries.length > 0 ? formatDate(maintEntries[0].date) : '';
  const lastServiceOdo = maintEntries.length > 0 && maintEntries[0].odometer > 0 ? maintEntries[0].odometer : 0;

  document.getElementById('tab-maintenance').innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Maintenance Spend</div><div class="kpi-value ${totalMaintSpend > 0 ? 'red' : 'green'}">${$(totalMaintSpend)}</div><div class="kpi-sub">${totalMaintSpend === 0 ? 'All services covered' : ''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Services Performed</div><div class="kpi-value blue">${maintEntries.length}</div><div class="kpi-sub">${lastServiceDate ? 'Last service: ' + lastServiceDate : ''}</div></div>
      ${lastServiceOdo > 0 ? `<div class="kpi-card"><div class="kpi-label">Mileage at Last Service</div><div class="kpi-value purple">${lastServiceOdo.toLocaleString()}</div></div>` : ''}
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-title"><span class="icon icon-purple"></span> Service History</div>${maintItems}
        <div class="summary-row"><span class="summary-label">Total Maintenance Cost</span><span class="summary-value ${totalMaintSpend > 0 ? 'red' : 'green'}">${$(totalMaintSpend)}</span></div>
      </div>
      <div class="card"><div class="card-title"><span class="icon icon-orange"></span> Maintenance Spend Over Time</div><div class="chart-container"><canvas id="maintChart"></canvas></div></div>
    </div>
  `;

  new Chart(document.getElementById('maintChart'), {
    type: 'bar',
    data: {
      labels: maintEntries.map(e => e.service),
      datasets: [{ label: 'Cost ($)', data: maintEntries.map(e => e.spend), backgroundColor: maintEntries.map((_, i) => ['rgba(79,140,255,0.6)', 'rgba(251,146,60,0.6)', 'rgba(52,211,153,0.6)', 'rgba(167,139,250,0.6)', 'rgba(34,211,238,0.6)'][i % 5]), borderColor: maintEntries.map((_, i) => ['#4f8cff', '#fb923c', '#34d399', '#a78bfa', '#22d3ee'][i % 5]), borderWidth: 1, borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v }, grid: { color: 'rgba(42,46,69,0.4)' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => 'Cost: $' + ctx.raw.toFixed(2) + (ctx.raw === 0 ? ' (Covered)' : '') } } } }
  });
}
</script>
</body>
</html>
